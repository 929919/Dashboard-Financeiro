<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Pessoais — SGD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-hint: #9b9b97;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-text: #085041;
    --red: #E24B4A;
    --red-bg: #FCEBEB;
    --red-text: #791F1F;
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.15);
      --text: #e8e8e4;
      --text-muted: #8a8a86;
      --text-hint: #5a5a58;
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --red-bg: #501313;
      --red-text: #F09595;
      --blue-bg: #042C53;
      --blue-text: #85B7EB;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    max-width: 720px;
    margin: 0 auto 28px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .container { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .kpi {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: -0.02em; }
  .kpi-value.pos { color: var(--green); }
  .kpi-value.neg { color: var(--red); }
  .kpi-value.neu { color: var(--blue); }

  /* Card */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 14px;
  }

  /* Form */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 120px 160px auto;
    gap: 8px;
    align-items: end;
    flex-wrap: wrap;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  input[type=text], input[type=number], select {
    width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color .15s;
  }

  input:focus, select:focus { border-color: var(--blue); }

  .income-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
  }

  .income-row input { width: 100px; }

  button.add-btn {
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    background: var(--text);
    color: var(--surface);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }

  button.add-btn:hover { opacity: 0.85; }

  /* Transactions */
  .tx-empty {
    text-align: center;
    font-size: 13px;
    color: var(--text-hint);
    padding: 20px 0;
  }

  .tx-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .tx-row:last-child { border-bottom: none; }

  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .tx-desc { flex: 1; font-size: 13px; }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: var(--radius-sm);
  }

  .tx-val {
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    color: var(--red);
    min-width: 80px;
    text-align: right;
  }

  .del-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 0.5px solid var(--border-strong);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, color .15s;
  }

  .del-btn:hover { background: var(--red-bg); color: var(--red-text); }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Responsive */
  @media (max-width: 600px) {
    .kpis { grid-template-columns: repeat(3, 1fr); }
    .form-row { grid-template-columns: 1fr 1fr; }
    .form-row .add-btn-wrap { grid-column: 1 / -1; }
    .charts-row { grid-template-columns: 1fr; }
    .kpi-value { font-size: 18px; }
  }

  @media (max-width: 380px) {
    .kpis { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Finanças pessoais</h1>
  <span id="month-label"></span>
</header>

<div class="container">

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">Saldo livre</div>
      <div class="kpi-value pos" id="k-free">S$ 0.00</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Renda</div>
      <div class="kpi-value neu" id="k-income">S$ 340.00</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Custos</div>
      <div class="kpi-value neg" id="k-costs">S$ 0.00</div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <div class="card-title">Adicionar transação</div>
    <div class="form-row">
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" id="f-desc" placeholder="Ex: Almoço, MRT...">
      </div>
      <div class="form-group">
        <label>Valor (SGD)</label>
        <input type="number" id="f-val" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="f-cat">
          <option value="food">Alimentação</option>
          <option value="transport">Transporte</option>
          <option value="leisure">Lazer</option>
          <option value="housing">Moradia</option>
          <option value="health">Saúde</option>
          <option value="other">Outros</option>
        </select>
      </div>
      <div class="add-btn-wrap" style="padding-bottom:1px">
        <button class="add-btn" onclick="addTx()">+ Adicionar</button>
      </div>
    </div>
    <div class="income-row">
      <span>Renda mensal (SGD):</span>
      <input type="number" id="f-income" value="340" min="0" step="1" onchange="recalc()">
    </div>
  </div>

  <!-- Transactions -->
  <div class="card">
    <div class="card-title">Transações</div>
    <div id="tx-list">
      <div class="tx-empty">Nenhuma transação ainda. Adicione acima.</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">Gastos por item</div>
      <div style="position:relative;height:200px">
        <canvas id="barChart" role="img" aria-label="Gastos por item em SGD">Nenhum dado.</canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Por categoria</div>
      <div id="pie-legend" class="legend"></div>
      <div style="position:relative;height:170px">
        <canvas id="pieChart" role="img" aria-label="Distribuição de gastos por categoria">Nenhum dado.</canvas>
      </div>
    </div>
  </div>

</div>

<script>
  // Set month label
  const now = new Date();
  document.getElementById('month-label').textContent =
    now.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

  const CAT_COLORS = {
    food: '#7F77DD', transport: '#1D9E75', leisure: '#EF9F27',
    housing: '#378ADD', health: '#D85A30', other: '#888780'
  };
  const CAT_LABELS = {
    food: 'Alimentação', transport: 'Transporte', leisure: 'Lazer',
    housing: 'Moradia', health: 'Saúde', other: 'Outros'
  };
  const CAT_TAGS = {
    food: 'background:#EEEDFE;color:#3C3489',
    transport: 'background:#E1F5EE;color:#085041',
    leisure: 'background:#FAEEDA;color:#633806',
    housing: 'background:#E6F1FB;color:#0C447C',
    health: 'background:#FAECE7;color:#712B13',
    other: 'background:#F1EFE8;color:#444441'
  };

  var txData = [];
  var barInst = null, pieInst = null;

  function sgd(v) {
    return new Intl.NumberFormat('en-SG', {
      style: 'currency', currency: 'SGD', minimumFractionDigits: 2
    }).format(v);
  }

  function recalc() {
    var income = parseFloat(document.getElementById('f-income').value) || 0;
    var costs = txData.reduce(function(a, t) { return a + t.val; }, 0);
    var free = income - costs;
    document.getElementById('k-income').textContent = sgd(income);
    document.getElementById('k-costs').textContent = sgd(costs);
    var kf = document.getElementById('k-free');
    kf.textContent = sgd(free);
    kf.className = 'kpi-value ' + (free >= 0 ? 'pos' : 'neg');
    renderCharts();
  }

  function renderTxList() {
    var el = document.getElementById('tx-list');
    if (!txData.length) {
      el.innerHTML = '<div class="tx-empty">Nenhuma transação ainda. Adicione acima.</div>';
      return;
    }
    el.innerHTML = txData.slice().reverse().map(function(t, ri) {
      var i = txData.length - 1 - ri;
      return '<div class="tx-row">' +
        '<div class="cat-dot" style="background:' + CAT_COLORS[t.cat] + '"></div>' +
        '<div class="tx-desc">' + t.desc + '</div>' +
        '<span class="tag" style="' + CAT_TAGS[t.cat] + '">' + CAT_LABELS[t.cat] + '</span>' +
        '<div class="tx-val">' + sgd(t.val) + '</div>' +
        '<button class="del-btn" onclick="delTx(' + i + ')" title="Remover">&#x2715;</button>' +
        '</div>';
    }).join('');
  }

  function renderCharts() {
    var barCtx = document.getElementById('barChart');
    var pieCtx = document.getElementById('pieChart');
    if (barInst) { barInst.destroy(); barInst = null; }
    if (pieInst) { pieInst.destroy(); pieInst = null; }

    if (!txData.length) {
      document.getElementById('pie-legend').innerHTML = '';
      return;
    }

    var textColor = getComputedStyle(document.documentElement)
      .getPropertyValue('--text-muted').trim() || '#6b6b67';
    var gridColor = 'rgba(128,128,128,0.12)';

    // Bar chart
    barInst = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: txData.map(function(t) {
          return t.desc.length > 10 ? t.desc.slice(0, 10) + '…' : t.desc;
        }),
        datasets: [{
          data: txData.map(function(t) { return parseFloat(t.val.toFixed(2)); }),
          backgroundColor: txData.map(function(t) { return CAT_COLORS[t.cat]; }),
          borderWidth: 0,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: function(c) { return ' ' + sgd(c.parsed.y); } } }
        },
        scales: {
          x: { ticks: { font: { size: 11 }, color: '#888780', autoSkip: false, maxRotation: 40 }, grid: { display: false } },
          y: { ticks: { callback: function(v) { return 'S$' + v; }, font: { size: 11 }, color: '#888780' }, grid: { color: gridColor } }
        }
      }
    });

    // Pie chart
    var catMap = {};
    txData.forEach(function(t) { catMap[t.cat] = (catMap[t.cat] || 0) + t.val; });
    var keys = Object.keys(catMap);
    var pieVals = keys.map(function(k) { return parseFloat(catMap[k].toFixed(2)); });
    var total = pieVals.reduce(function(a, v) { return a + v; }, 0);

    document.getElementById('pie-legend').innerHTML = keys.map(function(k, i) {
      var pct = total > 0 ? Math.round(pieVals[i] / total * 100) : 0;
      return '<span class="legend-item"><span class="legend-dot" style="background:' +
        CAT_COLORS[k] + '"></span>' + CAT_LABELS[k] + ' ' + pct + '%</span>';
    }).join('');

    pieInst = new Chart(pieCtx, {
      type: 'doughnut',
      data: {
        labels: keys.map(function(k) { return CAT_LABELS[k]; }),
        datasets: [{
          data: pieVals,
          backgroundColor: keys.map(function(k) { return CAT_COLORS[k]; }),
          borderWidth: 0
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: function(c) {
            var pct = total > 0 ? Math.round(c.parsed / total * 100) : 0;
            return ' ' + sgd(c.parsed) + ' (' + pct + '%)';
          }}}
        },
        cutout: '55%'
      }
    });
  }

  function addTx() {
    var desc = document.getElementById('f-desc').value.trim();
    var val = parseFloat(document.getElementById('f-val').value);
    var cat = document.getElementById('f-cat').value;
    if (!desc || !val || val <= 0) return;
    txData.push({ desc: desc, val: val, cat: cat });
    document.getElementById('f-desc').value = '';
    document.getElementById('f-val').value = '';
    renderTxList();
    recalc();
  }

  function delTx(i) {
    txData.splice(i, 1);
    renderTxList();
    recalc();
  }

  // Allow Enter key to add transaction
  document.getElementById('f-val').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTx();
  });

  recalc();
</script>
</body>
</html>
